<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Iron Log</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSXJvbiBMb2ciLCJzaG9ydF9uYW1lIjoiSXJvbkxvZyIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMTExMTExIiwidGhlbWVfY29sb3IiOiIjMTExMTExIn0=">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--surface:#1a1a1a;--card:#222;--border:#333;--text:#e8e8e8;--muted:#888;--accent:#4dabf7;--accent2:#69db7c;--danger:#ff6b6b;--orange:#ffa94d;--radius:12px;
--chest:#e64980;--back:#4dabf7;--legs:#ffa94d;--shoulders:#69db7c}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;font-size:16px}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input,select,textarea{font-family:inherit;font-size:16px;outline:none;border:none;background:var(--surface);color:var(--text);border-radius:8px;padding:12px 14px;width:100%;border:1px solid var(--border)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}

.app{max-width:480px;margin:0 auto;padding:0 16px 100px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;position:sticky;top:0;background:var(--bg);z-index:100}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--accent)}

.tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:16px;position:sticky;top:56px;z-index:99}
.tab{flex:1;padding:10px 0;text-align:center;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:all .2s}
.tab.active{background:var(--card);color:var(--text)}

.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-title{font-size:16px;font-weight:600}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:600;transition:all .15s;width:100%}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{background:#339af0;transform:scale(0.98)}
.btn-success{background:var(--accent2);color:#000}
.btn-success:active{background:#51cf66;transform:scale(0.98)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{background:#fa5252;transform:scale(0.98)}
.btn-ghost{background:transparent;color:var(--muted);font-size:13px;padding:8px}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:active{background:var(--surface)}

/* Split selector */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.split-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;border:2px solid var(--border);text-align:center;transition:all .15s}
.split-card:active{transform:scale(0.97)}
.split-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.split-card p{font-size:12px;color:var(--muted);line-height:1.3}
.split-card .split-icon{font-size:28px;margin-bottom:8px}
.split-card.chest{border-color:var(--chest)30}.split-card.chest h3{color:var(--chest)}
.split-card.back{border-color:var(--back)30}.split-card.back h3{color:var(--back)}
.split-card.legs{border-color:var(--legs)30}.split-card.legs h3{color:var(--legs)}
.split-card.shoulders{border-color:var(--shoulders)30}.split-card.shoulders h3{color:var(--shoulders)}

/* Exercise cards in session */
.ex-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.ex-card-name{font-size:15px;font-weight:700;margin-bottom:8px}
.ex-card-last{font-size:12px;color:var(--muted);margin-bottom:10px;font-style:italic}

.set-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.set-num{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--surface);border-radius:50%;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.set-input{display:flex;gap:6px;flex:1;align-items:center}
.set-input input{padding:10px;font-size:15px;text-align:center;width:100%}
.set-input label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
.set-input .field{display:flex;flex-direction:column;gap:2px;flex:1}
.set-actions{flex-shrink:0}
.set-actions button{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:transparent;color:var(--muted)}

.note-input{margin-top:8px}
.note-input textarea{font-size:14px;padding:10px;min-height:44px}
.note-text{font-size:13px;color:var(--muted);font-style:italic;margin-top:6px;line-height:1.4}

/* Timer */
.timer-container{text-align:center;padding:20px 0}
.timer-display{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-2px;margin-bottom:16px}
.timer-display.resting{color:var(--orange)}
.timer-display.ready{color:var(--accent2)}
.timer-presets{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.preset{padding:8px 16px;border-radius:20px;background:var(--surface);color:var(--text);font-size:14px;font-weight:600;border:1px solid var(--border)}
.preset.active{border-color:var(--accent);color:var(--accent)}
.timer-controls{display:flex;gap:10px;justify-content:center}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border-radius:10px;padding:14px;text-align:center}
.stat-value{font-size:24px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;line-height:1.5}

.session-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:200}
.session-info{font-size:14px}
.session-info strong{display:block;font-size:13px;color:var(--accent)}
.session-info span{color:var(--muted);font-size:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px}

.history-date{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:12px 0 6px}

.hidden{display:none!important}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Split label in session */
.split-label{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px;margin-bottom:12px}
.split-label.chest{background:var(--chest)20;color:var(--chest)}
.split-label.back{background:var(--back)20;color:var(--back)}
.split-label.legs{background:var(--legs)20;color:var(--legs)}
.split-label.shoulders{background:var(--shoulders)20;color:var(--shoulders)}

/* Add set btn inline */
.add-set-inline{font-size:12px;color:var(--accent);padding:4px 0;background:transparent;text-align:left;font-weight:600}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1><span>Iron</span>Log</h1>
    <button class="btn btn-sm btn-outline" id="exportBtn">Export</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="workout">Workout</button>
    <button class="tab" data-tab="timer">Timer</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <!-- WORKOUT TAB -->
  <div id="tab-workout" class="tab-content">
    <!-- Split Picker -->
    <div id="splitPicker">
      <p style="color:var(--muted);font-size:14px;text-align:center;margin-bottom:4px">Choose today's split</p>
      <div class="split-grid">
        <button class="split-card chest" onclick="startSplit('chest')">
          <div class="split-icon">&#128170;</div>
          <h3>Chest & Tris</h3>
          <p>DB Press, Incline, Flies, Press Down, Skull Crushers</p>
        </button>
        <button class="split-card back" onclick="startSplit('back')">
          <div class="split-icon">&#129470;</div>
          <h3>Back & Bis</h3>
          <p>Pullover, Pull Down, DB Rows, Wide Row, Curls</p>
        </button>
        <button class="split-card legs" onclick="startSplit('legs')">
          <div class="split-icon">&#129461;</div>
          <h3>Legs</h3>
          <p>Extensions, Leg Press, Calves, Hack Squat, Curls, Deadlift</p>
        </button>
        <button class="split-card shoulders" onclick="startSplit('shoulders')">
          <div class="split-icon">&#127947;</div>
          <h3>Shoulders</h3>
          <p>DB Press, DB Raise, Cable Raise, Shrugs, Rear Delts</p>
        </button>
      </div>
    </div>

    <!-- Active Session -->
    <div id="activeSession" class="hidden">
      <div id="sessionSplitLabel"></div>
      <div id="exerciseList"></div>
      <button class="btn btn-ghost" onclick="addCustomExercise()" style="margin-top:4px">+ Add Custom Exercise</button>
    </div>
  </div>

  <!-- TIMER TAB -->
  <div id="tab-timer" class="tab-content hidden">
    <div class="card">
      <div class="timer-container">
        <div class="timer-display ready" id="timerDisplay">0:00</div>
        <div class="timer-presets">
          <button class="preset active" data-time="60">1:00</button>
          <button class="preset" data-time="90">1:30</button>
          <button class="preset" data-time="120">2:00</button>
          <button class="preset" data-time="180">3:00</button>
          <button class="preset" data-time="300">5:00</button>
        </div>
        <div class="timer-controls">
          <button class="btn btn-primary btn-sm" id="timerStartBtn" onclick="toggleTimer()" style="min-width:100px">Start</button>
          <button class="btn btn-outline btn-sm" onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:8px">Tap a preset or let it count up</p>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab-content hidden">
    <div id="historyStats"></div>
    <div id="historyList"></div>
    <div id="historyEmpty" class="empty">
      <div class="empty-icon">&#128203;</div>
      <div class="empty-text">No history yet<br>Complete a workout to see it here</div>
    </div>
  </div>
</div>

<!-- Session bar -->
<div class="session-bar hidden" id="sessionBar">
  <div class="session-info">
    <strong id="sessionTimer">00:00</strong>
    <span id="sessionExCount">0 exercises</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm btn-success" onclick="finishSession()">Finish</button>
    <button class="btn btn-sm btn-ghost" onclick="cancelSession()" style="color:var(--danger)">Cancel</button>
  </div>
</div>

<!-- Session Detail Modal -->
<div class="modal-overlay hidden" id="sessionDetailModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 id="detailTitle">Session Detail</h2>
    <div id="detailContent"></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-outline" onclick="document.getElementById('sessionDetailModal').classList.add('hidden')">Close</button>
      <button class="btn btn-danger btn-sm" id="deleteSessionBtn" style="width:auto;padding:8px 16px">Delete</button>
    </div>
  </div>
</div>

<!-- Add Custom Exercise Modal -->
<div class="modal-overlay hidden" id="customExModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2>Add Custom Exercise</h2>
    <div class="form-group">
      <label class="form-label">Exercise Name</label>
      <input type="text" id="customExName" placeholder="e.g. Dips">
    </div>
    <div class="form-group">
      <label class="form-label">Sets</label>
      <input type="number" id="customExSets" value="3" inputmode="numeric" style="width:80px">
    </div>
    <button class="btn btn-primary" onclick="saveCustomExercise()" style="margin-top:12px">Add Exercise</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DORIAN YATES SPLIT TEMPLATES
// ═══════════════════════════════════════════
const SPLITS = {
  chest: {
    name: 'Chest & Triceps',
    color: 'chest',
    exercises: [
      { name: 'Dumbbell Press', defaultSets: 3 },
      { name: 'Incline Press (Machine)', defaultSets: 3 },
      { name: 'Machine Flies', defaultSets: 3 },
      { name: 'Tricep Press Down', defaultSets: 3 },
      { name: 'Skull Crushers', defaultSets: 3 }
    ]
  },
  back: {
    name: 'Back & Biceps',
    color: 'back',
    exercises: [
      { name: 'Cable Pullover', defaultSets: 3 },
      { name: 'Pull Down', defaultSets: 3 },
      { name: 'Dumbbell Rows', defaultSets: 3 },
      { name: 'Seated Wide Row', defaultSets: 3 },
      { name: 'Cable Bicep Curl', defaultSets: 3 },
      { name: 'Barbell Curl', defaultSets: 3 }
    ]
  },
  legs: {
    name: 'Legs',
    color: 'legs',
    exercises: [
      { name: 'Leg Extensions', defaultSets: 3 },
      { name: 'Leg Press', defaultSets: 3 },
      { name: 'Calf Raises', defaultSets: 3 },
      { name: 'Hack Squat', defaultSets: 3 },
      { name: 'Leg Curl', defaultSets: 3 },
      { name: 'Deadlift', defaultSets: 3 }
    ]
  },
  shoulders: {
    name: 'Shoulders',
    color: 'shoulders',
    exercises: [
      { name: 'Dumbbell Press', defaultSets: 3 },
      { name: 'Dumbbell Raise', defaultSets: 3 },
      { name: 'Cable Shoulder Raise', defaultSets: 3 },
      { name: 'Shrugs', defaultSets: 3 },
      { name: 'Rear Delt Flies', defaultSets: 3 }
    ]
  }
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let DB = loadDB();
let currentSession = null;
let sessionInterval = null;
let sessionStart = null;

// Timer
let timerInterval = null;
let timerSeconds = 0;
let timerTarget = 60;
let timerRunning = false;

function loadDB() {
  try { return JSON.parse(localStorage.getItem('ironlog_v2')) || { sessions: [] }; }
  catch(e) { return { sessions: [] }; }
}
function saveDB() { localStorage.setItem('ironlog_v2', JSON.stringify(DB)); }

// ═══════════════════════════════════════════
// AUTOSAVE — saves in-progress session to localStorage on every change
// ═══════════════════════════════════════════
function autosave() {
  if (!currentSession) return;
  const saveData = {
    session: currentSession,
    sessionStart: sessionStart,
    savedAt: Date.now()
  };
  localStorage.setItem('ironlog_autosave', JSON.stringify(saveData));
}

function clearAutosave() {
  localStorage.removeItem('ironlog_autosave');
}

function checkAutosaveRecovery() {
  try {
    const raw = localStorage.getItem('ironlog_autosave');
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved.session || !saved.session.split) { clearAutosave(); return; }

    // Check if this session was already finished (exists in DB with same date)
    const alreadySaved = DB.sessions.some(s =>
      s.date === saved.session.date && s.split === saved.session.split
    );
    if (alreadySaved) { clearAutosave(); return; }

    // Check if any data was actually entered
    const hasData = saved.session.exercises.some(ex =>
      ex.sets.some(s => s.reps || s.weight)
    );
    if (!hasData) { clearAutosave(); return; }

    const when = new Date(saved.savedAt);
    const timeStr = when.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

    if (confirm(`Recover unsaved ${saved.session.splitName} workout from ${timeStr}?`)) {
      currentSession = saved.session;
      sessionStart = saved.sessionStart || Date.now();
      document.getElementById('splitPicker').classList.add('hidden');
      document.getElementById('activeSession').classList.remove('hidden');
      document.getElementById('sessionBar').classList.remove('hidden');

      const split = SPLITS[currentSession.split];
      const d = new Date(currentSession.date);
      const isoDate = d.toISOString().slice(0, 10);
      const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('sessionSplitLabel').innerHTML =
        `<div style="margin-bottom:12px">
          <span class="split-label ${split ? split.color : ''}">${currentSession.splitName}</span>
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <span id="sessionDateDisplay" style="color:var(--muted);font-size:14px;cursor:pointer" onclick="showDatePicker()">${dateStr}</span>
            <button onclick="showDatePicker()" style="background:transparent;color:var(--accent);font-size:12px;padding:2px 6px">Edit</button>
          </div>
          <input type="date" id="sessionDateInput" value="${isoDate}"
            style="display:none;margin-top:6px"
            onchange="updateSessionDate(this.value)">
        </div>`;

      startSessionTimer();
      renderExercises();
    } else {
      clearAutosave();
    }
  } catch(e) {
    clearAutosave();
  }
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.remove('hidden');
    if (t.dataset.tab === 'history') renderHistory();
  });
});

// ═══════════════════════════════════════════
// LAST SESSION LOOKUP
// ═══════════════════════════════════════════
function getLastSessionForSplit(splitKey) {
  // Find the most recent completed session for this split
  return DB.sessions.find(s => s.split === splitKey) || null;
}

function getLastExerciseData(splitKey, exerciseName) {
  const lastSession = getLastSessionForSplit(splitKey);
  if (!lastSession) return null;
  return lastSession.exercises.find(e => e.name === exerciseName) || null;
}

// ═══════════════════════════════════════════
// START SESSION WITH SPLIT
// ═══════════════════════════════════════════
function startSplit(splitKey) {
  const split = SPLITS[splitKey];
  sessionStart = Date.now();

  // Build exercises pre-populated from last session
  const exercises = split.exercises.map(tmpl => {
    const lastData = getLastExerciseData(splitKey, tmpl.name);
    let sets;
    if (lastData && lastData.sets.length > 0) {
      // Copy last session's sets as defaults
      sets = lastData.sets.map(s => ({ reps: s.reps, weight: s.weight, unit: s.unit || 'lbs' }));
    } else {
      // Default empty sets
      sets = Array.from({ length: tmpl.defaultSets }, () => ({ reps: '', weight: '', unit: 'lbs' }));
    }
    return {
      name: tmpl.name,
      sets,
      notes: '',
      lastData: lastData // keep reference for "last time" display
    };
  });

  currentSession = {
    date: new Date().toISOString(),
    split: splitKey,
    splitName: split.name,
    color: split.color,
    exercises
  };

  document.getElementById('splitPicker').classList.add('hidden');
  document.getElementById('activeSession').classList.remove('hidden');
  document.getElementById('sessionBar').classList.remove('hidden');
  const now = new Date();
  const isoDate = now.toISOString().slice(0, 10); // YYYY-MM-DD for input
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('sessionSplitLabel').innerHTML =
    `<div style="margin-bottom:12px">
      <span class="split-label ${split.color}">${split.name}</span>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <span id="sessionDateDisplay" style="color:var(--muted);font-size:14px;cursor:pointer" onclick="showDatePicker()">${dateStr}</span>
        <button onclick="showDatePicker()" style="background:transparent;color:var(--accent);font-size:12px;padding:2px 6px">Edit</button>
      </div>
      <input type="date" id="sessionDateInput" value="${isoDate}"
        style="display:none;margin-top:6px"
        onchange="updateSessionDate(this.value)">
    </div>`;

  startSessionTimer();
  renderExercises();
}

// ═══════════════════════════════════════════
// RENDER EXERCISES (inline editing)
// ═══════════════════════════════════════════
function renderExercises() {
  if (!currentSession) return;
  const list = document.getElementById('exerciseList');
  document.getElementById('sessionExCount').textContent =
    currentSession.exercises.length + ' exercises';

  list.innerHTML = currentSession.exercises.map((ex, ei) => {
    // "Last time" summary + previous notes
    let lastStr = '';
    if (ex.lastData && ex.lastData.sets.length > 0) {
      const ls = ex.lastData.sets;
      const summary = ls.map((s, i) => `${s.weight} ${ls[0].unit || 'lbs'} × ${s.reps} reps`).join(', ');
      const prevNote = ex.lastData.notes ? `<div class="ex-card-last" style="color:var(--orange);font-style:normal">&#9998; ${esc(ex.lastData.notes)}</div>` : '';
      lastStr = `<div class="ex-card-last">Last: ${esc(summary)}</div>${prevNote}`;
    }

    const setsHtml = ex.sets.map((s, si) => `
      <div class="set-row">
        <div class="set-num">${si + 1}</div>
        <div class="set-input">
          <div class="field">
            ${si === 0 ? '<label>Weight</label>' : ''}
            <input type="number" inputmode="decimal" value="${s.weight}" placeholder="—"
              onchange="updateSet(${ei},${si},'weight',this.value)"
              onfocus="this.select()">
          </div>
          <div class="field">
            ${si === 0 ? '<label>Reps</label>' : ''}
            <input type="number" inputmode="numeric" value="${s.reps}" placeholder="—"
              onchange="updateSet(${ei},${si},'reps',this.value)"
              onfocus="this.select()">
          </div>
          <div class="field" style="flex:0 0 56px">
            ${si === 0 ? '<label>Unit</label>' : ''}
            <select onchange="updateSet(${ei},${si},'unit',this.value)" style="padding:10px 4px;font-size:13px;text-align:center">
              <option value="lbs" ${s.unit !== 'kg' ? 'selected' : ''}>lbs</option>
              <option value="kg" ${s.unit === 'kg' ? 'selected' : ''}>kg</option>
            </select>
          </div>
        </div>
        <div class="set-actions">
          ${ex.sets.length > 1 ? `<button onclick="removeSet(${ei},${si})" style="color:var(--danger)">✕</button>` : '<div style="width:30px"></div>'}
        </div>
      </div>
    `).join('');

    return `
      <div class="ex-card fade-in">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <input type="text" value="${esc(ex.name)}" class="ex-name-input"
            onchange="updateExName(${ei},this.value)"
            style="background:transparent;border:1px solid transparent;font-size:15px;font-weight:700;padding:4px 8px;border-radius:6px;flex:1"
            onfocus="this.style.borderColor='var(--border)';this.style.background='var(--surface)'"
            onblur="this.style.borderColor='transparent';this.style.background='transparent'">
          <button class="btn-ghost" onclick="removeExercise(${ei})" style="color:var(--danger);font-size:12px;padding:2px 6px;flex-shrink:0">Remove</button>
        </div>
        ${lastStr}
        ${setsHtml}
        <button class="add-set-inline" onclick="addSet(${ei})">+ Add Set</button>
        <div class="note-input">
          <textarea placeholder="Notes..." rows="1"
            onchange="updateNote(${ei},this.value)"
            onfocus="this.rows=2" onblur="if(!this.value)this.rows=1"
          >${esc(ex.notes)}</textarea>
        </div>
      </div>
    `;
  }).join('');
}

function updateSet(ei, si, field, value) {
  if (field === 'reps' || field === 'weight') {
    currentSession.exercises[ei].sets[si][field] = Number(value) || 0;
  } else {
    currentSession.exercises[ei].sets[si][field] = value;
  }
  autosave();
}

function updateExName(ei, value) {
  const trimmed = value.trim();
  if (trimmed) currentSession.exercises[ei].name = trimmed;
  autosave();
}

function updateNote(ei, value) {
  currentSession.exercises[ei].notes = value;
  autosave();
}

function showDatePicker() {
  const input = document.getElementById('sessionDateInput');
  input.style.display = input.style.display === 'none' ? 'block' : 'none';
}

function updateSessionDate(dateVal) {
  if (!currentSession || !dateVal) return;
  // Keep the time portion, just change the date
  const parts = dateVal.split('-');
  const newDate = new Date(currentSession.date);
  newDate.setFullYear(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  currentSession.date = newDate.toISOString();
  // Update display
  const display = document.getElementById('sessionDateDisplay');
  if (display) {
    display.textContent = newDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
  document.getElementById('sessionDateInput').style.display = 'none';
  autosave();
}

function addSet(ei) {
  const sets = currentSession.exercises[ei].sets;
  const last = sets[sets.length - 1];
  sets.push({ reps: last.reps || '', weight: last.weight || '', unit: last.unit || 'lbs' });
  renderExercises();
}

function removeSet(ei, si) {
  currentSession.exercises[ei].sets.splice(si, 1);
  renderExercises();
}

function removeExercise(ei) {
  const name = currentSession.exercises[ei].name;
  if (confirm('Remove ' + name + '?')) {
    currentSession.exercises.splice(ei, 1);
    renderExercises();
  }
}

// Custom exercise
function addCustomExercise() {
  document.getElementById('customExName').value = '';
  document.getElementById('customExSets').value = '3';
  document.getElementById('customExModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('customExName').focus(), 100);
}

function saveCustomExercise() {
  const name = document.getElementById('customExName').value.trim();
  if (!name) return;
  const numSets = parseInt(document.getElementById('customExSets').value) || 3;
  currentSession.exercises.push({
    name,
    sets: Array.from({ length: numSets }, () => ({ reps: '', weight: '', unit: 'lbs' })),
    notes: '',
    lastData: null
  });
  document.getElementById('customExModal').classList.add('hidden');
  renderExercises();
  // Scroll to bottom
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
}

// ═══════════════════════════════════════════
// SESSION MANAGEMENT
// ═══════════════════════════════════════════
function finishSession() {
  if (!currentSession) return;
  // Check if any data was entered
  const hasData = currentSession.exercises.some(ex =>
    ex.sets.some(s => s.reps || s.weight)
  );
  if (!hasData) {
    if (confirm('No data entered. Discard this session?')) { cancelSession(); }
    return;
  }

  // Clean up: remove lastData refs, filter out empty sets
  currentSession.exercises = currentSession.exercises.map(ex => ({
    name: ex.name,
    sets: ex.sets.filter(s => s.reps || s.weight).map(s => ({
      reps: Number(s.reps) || 0,
      weight: Number(s.weight) || 0,
      unit: s.unit || 'lbs'
    })),
    notes: ex.notes || ''
  })).filter(ex => ex.sets.length > 0);

  currentSession.duration = Math.floor((Date.now() - sessionStart) / 1000);
  delete currentSession.color; // don't need in storage
  DB.sessions.unshift(currentSession);
  saveDB();
  clearAutosave();
  endSession();
  document.querySelectorAll('.tab')[2].click();
}

function cancelSession() {
  if (currentSession) {
    const hasData = currentSession.exercises.some(ex =>
      ex.sets.some(s => s.reps || s.weight)
    );
    if (hasData && !confirm('Discard this workout?')) return;
  }
  endSession();
}

function endSession() {
  clearAutosave();
  currentSession = null;
  sessionStart = null;
  clearInterval(sessionInterval);
  document.getElementById('splitPicker').classList.remove('hidden');
  document.getElementById('activeSession').classList.add('hidden');
  document.getElementById('sessionBar').classList.add('hidden');
}

function startSessionTimer() {
  const el = document.getElementById('sessionTimer');
  sessionInterval = setInterval(() => {
    const s = Math.floor((Date.now() - sessionStart) / 1000);
    el.textContent = formatTime(s);
  }, 1000);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ═══════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════
document.querySelectorAll('.preset').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.preset').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    timerTarget = parseInt(p.dataset.time);
    if (!timerRunning) { timerSeconds = timerTarget; updateTimerDisplay(); }
  });
});

function toggleTimer() {
  timerRunning ? pauseTimer() : startTimerFn();
}

function startTimerFn() {
  if (timerSeconds === 0) timerSeconds = timerTarget;
  timerRunning = true;
  document.getElementById('timerStartBtn').textContent = 'Pause';
  const display = document.getElementById('timerDisplay');
  display.classList.add('resting');
  display.classList.remove('ready');
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      display.classList.remove('resting');
      display.classList.add('ready');
      document.getElementById('timerStartBtn').textContent = 'Start';
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerStartBtn').textContent = 'Resume';
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = timerTarget;
  const display = document.getElementById('timerDisplay');
  display.classList.remove('resting');
  display.classList.add('ready');
  document.getElementById('timerStartBtn').textContent = 'Start';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

timerSeconds = timerTarget;
updateTimerDisplay();

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const stats = document.getElementById('historyStats');

  if (DB.sessions.length === 0) {
    list.innerHTML = ''; stats.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const totalSessions = DB.sessions.length;
  const totalSets = DB.sessions.reduce((a, s) => a + s.exercises.reduce((b, e) => b + e.sets.length, 0), 0);
  const totalVolume = DB.sessions.reduce((a, s) => a + s.exercises.reduce((b, e) => b + e.sets.reduce((c, st) => c + (st.reps * st.weight), 0), 0), 0);
  const last7 = DB.sessions.filter(s => (Date.now() - new Date(s.date).getTime()) < 7 * 86400000).length;

  stats.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${totalSessions}</div><div class="stat-label">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-value">${last7}</div><div class="stat-label">This Week</div></div>
      <div class="stat-card"><div class="stat-value">${totalSets.toLocaleString()}</div><div class="stat-label">Total Sets</div></div>
      <div class="stat-card"><div class="stat-value">${fmtVol(totalVolume)}</div><div class="stat-label">Total Volume</div></div>
    </div>`;

  // Color map for split labels
  const colorMap = { chest: 'var(--chest)', back: 'var(--back)', legs: 'var(--legs)', shoulders: 'var(--shoulders)' };

  let html = '';
  let lastDate = '';
  DB.sessions.forEach((session, si) => {
    const d = new Date(session.date);
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    if (dateStr !== lastDate) { lastDate = dateStr; html += `<div class="history-date">${dateStr}</div>`; }

    const exCount = session.exercises.length;
    const setCount = session.exercises.reduce((a, e) => a + e.sets.length, 0);
    const dur = session.duration ? formatTime(session.duration) : '--';
    const splitColor = colorMap[session.split] || 'var(--accent)';
    const splitName = session.splitName || session.split || 'Workout';

    html += `
      <div class="card" style="cursor:pointer;margin-bottom:8px;border-left:3px solid ${splitColor}" onclick="showSessionDetail(${si})">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <div style="font-weight:600;font-size:15px;color:${splitColor}">${esc(splitName)}</div>
            <div style="color:var(--muted);font-size:13px;margin-top:2px">${exCount} exercises · ${setCount} sets · ${dur}</div>
          </div>
          <div style="color:var(--muted);font-size:12px">${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
        </div>
      </div>`;
  });
  list.innerHTML = html;
}

function fmtVol(v) {
  if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
  return v.toLocaleString();
}

function showSessionDetail(idx) {
  const session = DB.sessions[idx];
  const d = new Date(session.date);
  document.getElementById('detailTitle').textContent =
    (session.splitName || 'Workout') + ' — ' +
    d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  let html = `<p style="color:var(--muted);font-size:13px;margin-bottom:12px">${session.duration ? 'Duration: ' + formatTime(session.duration) : ''}</p>`;

  session.exercises.forEach(ex => {
    html += `<div class="card" style="margin-bottom:8px">
      <div class="card-title" style="margin-bottom:6px">${esc(ex.name)}</div>
      ${ex.sets.map((s, si) => `
        <div class="set-row" style="padding:4px 0">
          <div class="set-num">${si + 1}</div>
          <div style="flex:1;font-size:14px"><strong>${s.reps}</strong> <span style="color:var(--muted)">reps</span> × <strong>${s.weight}</strong> <span style="color:var(--muted)">${s.unit || 'lbs'}</span></div>
        </div>
      `).join('')}
      ${ex.notes ? `<div class="note-text">${esc(ex.notes)}</div>` : ''}
    </div>`;
  });

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('deleteSessionBtn').onclick = () => {
    if (confirm('Delete this entire session?')) {
      DB.sessions.splice(idx, 1);
      saveDB();
      document.getElementById('sessionDetailModal').classList.add('hidden');
      renderHistory();
    }
  };
  document.getElementById('sessionDetailModal').classList.remove('hidden');
}

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
document.getElementById('exportBtn').addEventListener('click', () => {
  if (DB.sessions.length === 0) { alert('No data to export'); return; }
  let csv = 'Date,Split,Exercise,Set,Reps,Weight,Unit,Notes\n';
  DB.sessions.forEach(session => {
    const d = new Date(session.date).toLocaleDateString();
    session.exercises.forEach(ex => {
      ex.sets.forEach((s, si) => {
        csv += `"${d}","${session.splitName || ''}","${ex.name}",${si+1},${s.reps},${s.weight},"${s.unit||'lbs'}","${(ex.notes||'').replace(/"/g,'""')}"\n`;
      });
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ironlog_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
});

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

renderHistory();

// Check for unsaved workout on page load
checkAutosaveRecovery();
</script>
</body>
</html>
